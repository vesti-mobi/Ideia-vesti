name: Atualizar PainelCSGerencial diariamente

on:
  schedule:
    - cron: '0 8 * * *'  # 5:00 BRT (8:00 UTC) - stagger apos update-dashboard.yml (7:30)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do disparo manual'
        required: false
        default: 'manual'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias Node (NovosVestiPago)
        working-directory: NovosVestiPago
        run: npm init -y >/dev/null 2>&1 || true && npm install --silent tedious

      - name: Instalar ODBC Driver 18 for SQL Server
        run: |
          . /etc/os-release
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
          curl -sSL "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/prod.list" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq msodbcsql18 unixodbc-dev

      - name: Instalar dependencias Python
        run: pip install pyodbc openpyxl google-auth requests

      - name: Preparar secrets
        working-directory: PainelCSGerencial
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          if [ -z "$GOOGLE_SA_JSON" ]; then
            echo "ERRO: secret GOOGLE_SA_JSON nao configurado"
            exit 1
          fi
          echo "$GOOGLE_SA_JSON" > google_sa.json
          echo "HUBSPOT_TOKEN=$HUBSPOT_TOKEN" > .env.local
          cat > fabric_config.json <<'EOF'
          {
            "sql_endpoint": "7sowj2vsfd6efgf3phzgjfmvaq-nrdsskmspnteherwztit766zc4.datawarehouse.fabric.microsoft.com",
            "database": "VestiHouse"
          }
          EOF

      - name: Rodar build NovosVestiPago
        working-directory: NovosVestiPago
        env:
          FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: node build.js || echo "WARN: NovosVestiPago build falhou"

      - name: Rodar pipeline
        working-directory: PainelCSGerencial
        env:
          FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: |
          python fetch_fabric.py || echo "WARN: fetch_fabric falhou"
          python fetch_sheets.py || echo "WARN: fetch_sheets falhou"
          python fetch_users.py || echo "WARN: fetch_users falhou"
          python fetch_hubspot.py || echo "WARN: fetch_hubspot falhou"
          python fetch_churn_vestipago.py || echo "WARN: fetch_churn_vestipago falhou"
          python fetch_gmv.py || echo "WARN: fetch_gmv falhou"
          python fetch_top80.py || echo "WARN: fetch_top80 falhou"
          python merge_data.py
          python build_html.py

      - name: Limpar secrets do filesystem
        if: always()
        working-directory: PainelCSGerencial
        run: rm -f google_sa.json .env.local fabric_config.json

      # Garante que CS-Sucesso-do-cliente/dados.js recebe os mesmos fabricCounts
      # do companies_data.json recem-gerado. Sem isto, o update-dashboard.yml das
      # 07:30 UTC grava fabricCounts a partir do companies_data.json de ontem,
      # e as KPIs dos dois dashboards divergem por um dia ate o proximo ciclo.
      - name: Sincronizar fabricCounts do CS-Sucesso-do-cliente
        run: node CS-Sucesso-do-cliente/patch-empresas.js

      - name: Commit e push se houver mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PainelCSGerencial/index.html PainelCSGerencial/dashboard_full_data.js PainelCSGerencial/companies_data.json CS-Sucesso-do-cliente/dados.js 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Atualizacao PainelCS $(date +'%d/%m/%Y %H:%M')"
          for i in 1 2 3; do
            if git push; then break; fi
            echo "Push falhou (tentativa $i), rebase..."
            git pull --rebase origin main || { echo "Rebase falhou"; exit 1; }
          done

      - name: Publicar no repo PainelCSGerencial (GitHub Pages)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e
          git clone --depth 1 "https://x-access-token:${GH_PAT}@github.com/marialauramarqui/PainelCSGerencial.git" /tmp/pcs-publish
          cp PainelCSGerencial/index.html /tmp/pcs-publish/index.html
          cp PainelCSGerencial/dashboard_full_data.js /tmp/pcs-publish/dashboard_full_data.js
          cd /tmp/pcs-publish
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html dashboard_full_data.js
          if git diff --cached --quiet; then
            echo "sem mudancas para publicar"
          else
            git commit -m "Atualizacao automatica $(date +'%Y-%m-%d %H:%M') (via Ideia-vesti)"
            git push
          fi
