name: Atualizar Dashboard CS diariamente

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx tedious

      - name: Rebuild CS Sucesso do Cliente via Fabric e HubSpot
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: node CS-Sucesso-do-cliente/build-cloud.js

      - name: Propagar refresh token entre steps
        continue-on-error: true
        run: |
          if [ -f CS-Sucesso-do-cliente/.new_refresh_token ]; then
            NEW_TOKEN=$(cat CS-Sucesso-do-cliente/.new_refresh_token)
            # Mascara o token nos logs (sem isso, qualquer step que printe env mostra o token em texto puro)
            echo "::add-mask::$NEW_TOKEN"
            echo "FABRIC_REFRESH_TOKEN=$NEW_TOKEN" >> $GITHUB_ENV
          fi

      - name: Patch Links e Cliques (fallback se build-cloud falhou)
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: node CS-Sucesso-do-cliente/patch-links.js

      - name: Patch Painel CS vendas mensais e invoices
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: node CS-Sucesso-do-cliente/patch-painel-cs.js

      - name: Patch Oraculo Fabric lote 1
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: node CS-Sucesso-do-cliente/patch-oraculo.js

      - name: Patch Oraculo Fabric lote 2
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: sleep 30 && node CS-Sucesso-do-cliente/patch-oraculo.js

      - name: Patch Oraculo Fabric lote 3
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: sleep 30 && node CS-Sucesso-do-cliente/patch-oraculo.js

      - name: Patch Invoices Iugu
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: node CS-Sucesso-do-cliente/patch-invoices.js

      - name: Atualizar refresh token antes de Pedidos por Marca
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f CS-Sucesso-do-cliente/.new_refresh_token ]; then
            NEW_TOKEN=$(cat CS-Sucesso-do-cliente/.new_refresh_token)
            echo "::add-mask::$NEW_TOKEN"
            if [ -n "$GH_TOKEN" ]; then
              gh secret set FABRIC_REFRESH_TOKEN --body "$NEW_TOKEN" && echo "Secret rotacionado" || echo "WARN: gh secret set falhou"
            else
              echo "WARN: GH_PAT nao configurado — secret nao sera rotacionado (token vai expirar)"
            fi
            echo "FABRIC_REFRESH_TOKEN=$NEW_TOKEN" >> $GITHUB_ENV
            rm -f CS-Sucesso-do-cliente/.new_refresh_token
          fi

      - name: Rebuild Pedidos por Marca via Fabric
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
        run: node Pedidos-por-Marca/build-cloud.js

      - name: Rebuild Novos VestiPago via Fabric lakehouse
        continue-on-error: true
        env:
          FABRIC_REFRESH_TOKEN: ${{ env.FABRIC_REFRESH_TOKEN || secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
        run: node NovosVestiPago/build.js

      - name: Verificar se houve alteracao
        id: check
        run: |
          git add -A
          git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit e push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CS-Sucesso-do-cliente/dados.js Pedidos-por-Marca/dados.js Pedidos-por-Marca/chunks.js Pedidos-por-Marca/data/ NovosVestiPago/dados.js
          git commit -m "Atualizacao automatica completa $(date +'%d/%m/%Y %H:%M')"
          # Retry com rebase em caso de race condition (alguem pushou durante o run)
          for i in 1 2 3; do
            if git push; then
              break
            fi
            echo "Push falhou (tentativa $i), fazendo pull --rebase..."
            git pull --rebase origin main || { echo "Rebase falhou, abortando"; exit 1; }
          done
