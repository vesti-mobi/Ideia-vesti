name: Atualizar Dashboard CS diariamente                                                                                                                                                                                                                                                                                                                                                                                              on:                                                                                                                                                                                                                  schedule:                                                                                                                                                                                                            - cron: '30 7 * * *'                                                                                                                                                                                             workflow_dispatch:                                                                                                                                                                                                                                                                                                                                                                                                                  jobs:                                                                                                                                                                                                                update:                                                                                                                                                                                                              runs-on: ubuntu-latest                                                                                                                                                                                             permissions:                                                                                                                                                                                                         contents: write                                                                                                                                                                                                                                                                                                                                                                                                                     steps:                                                                                                                                                                                                               - name: Checkout repositorio                                                                                                                                                                                         uses: actions/checkout@v4                                                                                                                                                                                                                                                                                                                                                                                                           - name: Setup Node.js                                                                                                                                                                                                uses: actions/setup-node@v4                                                                                                                                                                                        with:                                                                                                                                                                                                                node-version: '20'                                                                                                                                                                                                                                                                                                                                                                                                                - name: Install dependencies                                                                                                                                                                                         run: npm install xlsx tedious                                                                                                                                                                                                                                                                                                                                                                                                       - name: Rebuild CS Sucesso do Cliente via Fabric e HubSpot                                                                                                                                                           env:                                                                                                                                                                                                                 HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}                                                                                                                                                                        FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}                                                                                                                                                          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}                                                                                                                                                                  FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}                                                                                                                                                                run: node CS-Sucesso-do-cliente/build-cloud.js                                                                                                                                                                                                                                                                                                                                                                                      - name: Patch Invoices Iugu                                                                                                                                                                                          continue-on-error: true                                                                                                                                                                                            env:                                                                                                                                                                                                                 FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}                                                                                                                                                          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}                                                                                                                                                                  FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}                                                                                                                                                                run: node CS-Sucesso-do-cliente/patch-invoices.js                                                                                                                                                                                                                                                                                                                                                                                   - name: Patch Oraculo Fabric                                                                                                                                                                                         continue-on-error: true                                                                                                                                                                                            env:                                                                                                                                                                                                                 FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}                                                                                                                                                          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}                                                                                                                                                                  FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}                                                                                                                                                                run: node CS-Sucesso-do-cliente/patch-oraculo.js                                                                                                                                                                                                                                                                                                                                                                                    - name: Rebuild Pedidos por Marca via Fabric                                                                                                                                                                         env:                                                                                                                                                                                                                 FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}                                                                                                                                                          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}                                                                                                                                                                run: node Pedidos-por-Marca/build-cloud.js                                                                                                                                                                                                                                                                                                                                                                                          - name: Atualizar refresh token se renovado                                                                                                                                                                          continue-on-error: true                                                                                                                                                                                            run: |                                                                                                                                                                                                               if [ -f CS-Sucesso-do-cliente/.new_refresh_token ]; then                                                                                                                                                             NEW_TOKEN=$(cat CS-Sucesso-do-cliente/.new_refresh_token)                                                                                                                                                          gh secret set FABRIC_REFRESH_TOKEN --body "$NEW_TOKEN" || echo "WARN: nao atualizou secret"                                                                                                                        rm -f CS-Sucesso-do-cliente/.new_refresh_token                                                                                                                                                                   fi                                                                                                                                                                                                               env:                                                                                                                                                                                                                 GH_TOKEN: ${{ secrets.GH_PAT }}                                                                                                                                                                                                                                                                                                                                                                                                   - name: Verificar se houve alteracao                                                                                                                                                                                 id: check                                                                                                                                                                                                          run: |                                                                                                                                                                                                               git add -A                                                                                                                                                                                                         git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT                                                                                                                                                                                                                                                                                                                      - name: Commit e push                                                                                                                                                                                                if: steps.check.outputs.changed == 'true'                                                                                                                                                                          run: |                                                                                                                                                                                                               git config user.name "github-actions[bot]"                                                                                                                                                                         git config user.email "github-actions[bot]@users.noreply.github.com"                                                                                                                                               git add CS-Sucesso-do-cliente/dados.js Pedidos-por-Marca/dados.js Pedidos-por-Marca/chunks.js Pedidos-por-Marca/data/                                                                                              git commit -m "Atualizacao automatica completa $(date +'%d/%m/%Y %H:%M')"                                                                                                                                          git push
