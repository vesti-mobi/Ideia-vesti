name: Atualizar Dashboard CS diariamente

on:
  schedule:
    # 4:30am horário de Brasília (UTC-3) = 07:30 UTC
    - cron: '30 7 * * *'
  workflow_dispatch: # permite rodar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx tedious

      - name: Rebuild CS Sucesso do Cliente via Fabric + HubSpot
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
        run: node CS-Sucesso-do-cliente/build-cloud.js

      - name: Rebuild Pedidos por Marca via Fabric + Lakehouse
        env:
          FABRIC_REFRESH_TOKEN: ${{ secrets.FABRIC_REFRESH_TOKEN }}
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
        run: node Pedidos-por-Marca/build-cloud.js

      - name: Atualizar refresh token se renovado
        if: hashFiles('CS-Sucesso-do-cliente/.new_refresh_token') != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          NEW_TOKEN=$(cat CS-Sucesso-do-cliente/.new_refresh_token)
          gh secret set FABRIC_REFRESH_TOKEN --body "$NEW_TOKEN" || echo "WARN: Não foi possível atualizar o secret automaticamente"
          rm -f CS-Sucesso-do-cliente/.new_refresh_token

      - name: Verificar se houve alteração
        id: check
        run: |
          git add -A
          git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit e push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CS-Sucesso-do-cliente/dados.js Pedidos-por-Marca/dados.js Pedidos-por-Marca/chunks.js Pedidos-por-Marca/data/
          git commit -m "Atualização automática completa $(date +'%d/%m/%Y %H:%M')"
          git push
